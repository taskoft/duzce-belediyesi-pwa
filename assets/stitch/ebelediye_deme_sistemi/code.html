<body class="flex items-center justify-center min-h-screen bg-neutral-200 py-8">

                    Borç Sorgulama

<div class="space-y-stack-md">
<div>

<div class="relative">

</div>

<span class="material-symbols-outlined">search</span>
                        Sorgula
                    </button>
</div>
</section>
<!-- Unpaid Invoices Section -->
<section class="flex flex-col gap-stack-md">
<div class="flex items-center justify-between">
<h2 class="font-headline-md text-headline-md-mobile text-on-surface">Ödenmemiş Borçlar</h2>
<span class="bg-[#DC2626] text-white font-label-sm text-[10px] px-2 py-1 rounded-full">2 Adet</span>
</div>
<!-- Invoice Card 1 -->
<label class="bg-surface rounded-2xl shadow-sm p-4 border border-primary/20 flex items-start gap-4 cursor-pointer hover:bg-surface-container-low transition-colors group relative overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-[#0F4C81]"></div>
<div class="pt-1">
<input checked="" class="w-5 h-5 rounded-full border-2 border-outline text-[#0F4C81] focus:ring-[#0F4C81] focus:ring-offset-0 transition-all cursor-pointer" type="checkbox"/>
</div>
<div class="flex-1">
<div class="flex justify-between items-start mb-1">
<h3 class="font-label-lg text-label-lg text-on-surface">Çevre Temizlik Vergisi</h3>
<span class="font-headline-md text-headline-md-mobile text-[#0F4C81]">240 TL</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">calendar_today</span>

</label>
<!-- Invoice Card 2 -->

<div class="absolute bottom-0 w-full bg-surface shadow-[0_-4px_20px_rgba(0,0,0,0.08)] rounded-t-3xl pt-4 pb-8 px-container-margin z-40 border-t border-outline-variant/20">

<span class="material-symbols-outlined">lock</span>

<div class="px-container-margin pb-8 overflow-y-auto">

<div class="w-full h-48 rounded-2xl p-6 mb-6 relative overflow-hidden shadow-lg text-white" style="background: linear-gradient(135deg, #0F4C81 0%, #0a365c 100%);">

<div>
<div class="text-[10px] opacity-60 uppercase tracking-wider mb-1">Kart Sahibi</div>

</div>
<div>

<!-- Payment Form -->
<form class="space-y-stack-md">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1 ml-1">Kart Üzerindeki İsim</label>
<input class="w-full bg-background-subtle border border-outline-variant rounded-xl h-component-height-md px-4 font-body-lg text-body-lg text-on-surface focus:border-[#0F4C81] focus:ring-1 focus:ring-[#0F4C81] transition-colors" onkeyup="updateCard('name', this.value)" placeholder="Örn. Ahmet Yılmaz" type="text"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1 ml-1">Kart Numarası</label>
<div class="relative">
<input class="w-full bg-background-subtle border border-outline-variant rounded-xl h-component-height-md px-4 font-body-lg text-body-lg text-on-surface focus:border-[#0F4C81] focus:ring-1 focus:ring-[#0F4C81] transition-colors" maxlength="19" onkeyup="updateCard('number', this.value)" placeholder="0000 0000 0000 0000" type="tel"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">credit_card</span>
</div>
</div>
<div class="flex gap-4">
<div class="flex-1">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1 ml-1">Son Kullanma</label>

</div>
<div class="flex-1">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1 ml-1 flex items-center justify-between">
                                CVV
                                <span class="material-symbols-outlined text-[14px] cursor-help" title="Kartın arkasındaki 3 haneli kod">info</span>
</label>
<input class="w-full bg-background-subtle border border-outline-variant rounded-xl h-component-height-md px-4 font-body-lg text-body-lg text-on-surface text-center focus:border-[#0F4C81] focus:ring-1 focus:ring-[#0F4C81] transition-colors" maxlength="3" placeholder="•••" type="password"/>
</div>
</div>
<div class="pt-4 border-t border-outline-variant/20 mt-6">
<div class="flex justify-between items-center mb-4">
<span class="font-body-lg text-body-lg text-on-surface-variant">Ödenecek Tutar</span>
<span class="font-headline-lg text-headline-lg-mobile text-[#0F4C81]">390 TL</span>
</div>
<button class="w-full bg-[#0F4C81] text-on-primary rounded-xl h-component-height-lg font-label-lg text-label-lg flex items-center justify-center gap-2 hover:-translate-y-0.5 active:scale-98 transition-all shadow-md relative overflow-hidden group" type="button">
<div class="absolute inset-0 w-0 bg-white/20 transition-all duration-[250ms] ease-out group-hover:w-full"></div>
<span class="relative z-10 flex items-center gap-2">
                                Ödemeyi Tamamla
                                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</span>
</button>
</div>
</form>
</div>
</div>
</div>
<script>
        // Modal logic
        function closeModal() {
            document.getElementById('payment-modal').classList.add('translate-y-full');
            document.getElementById('payment-backdrop').classList.add('opacity-0', 'pointer-events-none');
        }

        // Simple real-time card visual update
        function updateCard(type, value) {
            if(type === 'name') {
                document.getElementById('name-display').innerText = value || 'AD SOYAD';
            } else if (type === 'number') {
                let formatted = value.replace(/\W/gi, '').replace(/(.{4})/g, '$1 ').trim();
                document.getElementById('card-display').innerText = formatted || '•••• •••• •••• ••••';
            } else if (type === 'date') {
                document.getElementById('date-display').innerText = value || 'AA/YY';
            }
        }
        
        // Basic TC formatting visual feedback
        const tcInput = document.querySelector('input[type="text"][value="12345678901"]');
        if(tcInput) {
            tcInput.addEventListener('input', function(e) {
                if(e.target.value.length === 11) {
                    document.getElementById('tc-check').classList.remove('opacity-0');
                } else {
                    document.getElementById('tc-check').classList.add('opacity-0');
                }
            });
            // trigger initial state
            if(tcInput.value.length === 11) document.getElementById('tc-check').classList.remove('opacity-0');
        }
    </script>
