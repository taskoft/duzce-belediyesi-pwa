<style>
        body { -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c2c7d1; border-radius: 4px; }

<style>
    body {

<body class="bg-background-subtle font-body-lg text-on-surface antialiased min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 shadow-sm bg-surface dark:bg-surface-dim">
<div class="flex justify-between items-center px-container-margin h-component-height-lg w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-headline-md">
                    D
                </div>
<h1 class="font-headline-md text-headline-md-mobile text-primary dark:text-primary-fixed">Düzce Belediyesi</h1>
</div>
<button class="p-2 text-outline dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-[76px] px-container-margin max-w-3xl mx-auto space-y-stack-lg">
<!-- Page Title -->
<div class="py-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-ink-base">Akıllı Ulaşım</h2>
<p class="font-body-md text-body-md text-outline mt-1">Ulaşım planlaması ve hizmetleri</p>
</div>
<!-- 'Nasıl Giderim?' Panel (Glassmorphism inspired card) -->
<section class="bg-surface rounded-card p-4 shadow-sm border border-outline-variant/30 relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/5 rounded-bl-full -z-10"></div>
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined fill text-primary">directions_bus</span>
<h3 class="font-label-lg text-label-lg text-on-surface">Nasıl Giderim?</h3>
</div>
<!-- Inputs -->
<div class="relative space-y-3">
<!-- Timeline visual connector -->
<div class="absolute left-[15px] top-[24px] bottom-[24px] w-0.5 bg-outline-variant/50"></div>
<!-- Mevcut Konum -->
<div class="relative flex items-center">
<div class="w-8 flex justify-center z-10">
<div class="w-3 h-3 rounded-full border-2 border-primary bg-surface"></div>
</div>
<div class="flex-1 relative">
<input class="w-full h-12 bg-background-subtle border border-outline-variant/50 rounded-btn px-4 text-on-surface font-body-md focus:border-primary focus:ring-0 transition-colors" placeholder="Mevcut Konum" type="text" value="Belediye Meydanı"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined text-[20px]">my_location</span>
</button>
</div>
</div>
<!-- Varış Noktası -->
<div class="relative flex items-center">
<div class="w-8 flex justify-center z-10">
<div class="w-3 h-3 rounded-full bg-secondary"></div>
</div>
<div class="flex-1">
<input class="w-full h-12 bg-background-subtle border border-outline-variant/50 rounded-btn px-4 text-on-surface font-body-md focus:border-primary focus:ring-0 transition-colors" placeholder="Varış Noktası Ara..." type="text"/>
</div>
</div>
<!-- Swap Button -->
<button class="absolute left-6 top-1/2 -translate-y-1/2 w-8 h-8 bg-surface border border-outline-variant/50 rounded-full flex items-center justify-center text-outline shadow-sm hover:text-primary transition-colors z-20 active:scale-90">
<span class="material-symbols-outlined text-[16px]">swap_vert</span>
</button>
</div>
<button class="w-full h-component-height-md mt-4 bg-primary text-on-primary rounded-btn font-label-lg text-label-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-sm">
                Rota Oluştur
            </button>
</section>
<!-- Bento Grid for Support Services -->
<div class="grid grid-cols-2 gap-4">
<!-- Taksi Durakları (Click-to-call intent) -->
<div class="col-span-1 bg-surface rounded-card p-4 shadow-sm border border-outline-variant/30 flex flex-col justify-between active:scale-[0.98] transition-transform">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-primary">local_taxi</span>
</div>
<div>
<h3 class="font-label-lg text-label-lg text-on-surface mb-1">Taksi Durakları</h3>

</div>
</div>
<!-- HES Kodu Tanımlama -->
<div class="col-span-1 bg-surface rounded-card p-4 shadow-sm border border-outline-variant/30 flex flex-col justify-between active:scale-[0.98] transition-transform">

<span class="material-symbols-outlined text-on-error-container">qr_code_scanner</span>
</div>
<div>

</div>
</div>
<!-- Kayıp Eşyalar Sorgulama (Tabular preview) -->
<div class="col-span-2 bg-surface rounded-card p-4 shadow-sm border border-outline-variant/30">
<div class="flex items-center justify-between mb-3">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary">find_in_page</span>

</div>
<div class="space-y-2">

<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">wallet</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface">Siyah Cüzdan</p>
<p class="font-[10px] text-[10px] text-outline">Hat 14 - Dün</p>
</div>
</div>
<span class="px-2 py-1 bg-surface-container-low text-primary-container font-label-sm text-[10px] rounded-full">İnceleniyor</span>
</div>
</div>
</div>
</div>
</main>

<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-xl shadow-[0_-1px_3px_0_rgba(0,0,0,0.05)] md:hidden">
<div class="flex justify-around items-center h-component-height-lg px-2 pb-safe w-full">
<button class="flex flex-col items-center justify-center text-outline dark:text-outline-variant opacity-40 hover:opacity-100 transition-opacity active:scale-90 transition-transform duration-200">

<span class="font-label-sm text-label-sm mt-1">Ana Sayfa</span>

<span class="font-label-sm text-label-sm mt-1">Düzcespor</span>
</button>

<span class="material-symbols-outlined fill">person</span>
<span class="font-label-sm text-label-sm mt-1">Profil</span>
</button>
</div>
</nav>
<script>
        // Simple visual interaction for input focus
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('opacity-100');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('opacity-100');
            });
        });
    </script>
</body></html>
